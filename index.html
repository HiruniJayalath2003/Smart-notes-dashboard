<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart notes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="body p-10">
    <header class="hero flex items-center justify-between border-b border-gray-300">
        <h1 class="main-title text-2xl text-gray-800 font-bold">Smart Notes Dashboard</h1>
        <figure class="images flex items-center gap-x-7">
            <div class="set flex items-center gap-x-3 border border-gray-300 p-1 border rounded-md ">
                <img src="images/search.png" alt="search icon"
                    class="search-btn">
                <input type="text" placeholder="Search by title" class="search-area outline-none">
                </search>
            </div>
            <div class="set flex items-center gap-x-3">
                <img src="images/settings.png" alt="setting icon">
                <p class="text">Settings</p>
            </div>
            <div class="set flex items-center gap-x-3">
                <img src="images/login.png" alt="login/logout icon">
                <p class="text">Logout</p>
            </div>
        </figure>
    </header>
    <form class="note-form flex flex-col p-5">
        <input type="text" placeholder="Note Title" id="input-note-title"class="title p-2 border rounded-md border-gray-300 outline-none">
        <div class="Description flex items-center justify-between pt-3 gap-x-2">
            <input type="text" placeholder="Note Description" id="input-note-desc"class="add-desc flex-10 p-2 border rounded-md border-gray-300 outline-none">
            <button class="submit flex-1 p-2 border border-green-500 rounded-md bg-green-300">Add Note</button>
        </div>

    </form>

    <script src="script.js"></script>
</body>

</html>
